<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drag me</title>
<style>
  body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
  }

  #btn {
    width: 150px;
    height: 80px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    position: absolute;
    left: 50px;
    top: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Consolas;
    font-size: 20px;
    color: blue;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  #dominio {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: #0A0;
    font-family: Consolas;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div id="btn">Arrastrame!</div>

<div id="dominio">windsoyr.github.io</div>

<script>
const btn = document.getElementById("btn");

let dragging = false;
let offsetX = 0;
let offsetY = 0;

btn.addEventListener("pointerdown", (e) => {
  dragging = true;
  btn.setPointerCapture(e.pointerId);

  offsetX = e.clientX - btn.offsetLeft;
  offsetY = e.clientY - btn.offsetTop;

  btn.style.cursor = "grabbing";
});

btn.addEventListener("pointermove", (e) => {
  if (!dragging) return;

  btn.style.left = (e.clientX - offsetX) + "px";
  btn.style.top = (e.clientY - offsetY) + "px";
});

btn.addEventListener("pointerup", () => {
  dragging = false;
  btn.style.cursor = "grab";
});
</script>

</body>
</html>
