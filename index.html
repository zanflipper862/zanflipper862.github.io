<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Drag me</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #001a4d 0%, #003d99 100%);
    height: 100vh;
    overflow: hidden;
  }

  #btn {
    width: 150px;
    height: 80px;
    background: #0052cc;
    border: 2px solid #0039a6;
    border-radius: 10px;
    position: absolute;
    left: 50px;
    top: 50px;
    display: flex;
    /* ensure multi-line text is centered */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* fallback centering for inline text wrapping */
    text-align: center;
    box-sizing: border-box;
    padding: 6px 8px;
    font-family: Consolas;
    font-size: 20px;
    color: #ffffff;
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: 0 4px 15px rgba(0, 82, 204, 0.4);
    transition: box-shadow 0.2s ease;
  }

  #btn:hover {
    box-shadow: 0 6px 20px rgba(0, 82, 204, 0.6);
  }

  #btn:active {
    box-shadow: 0 2px 8px rgba(0, 82, 204, 0.3);
  }

  #dominio {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: #00ccff;
    font-family: Consolas;
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div id="btn">Arrastrame! (Drag me!)</div>

<div id="dominio">windsoyr.github.io</div>

<script>
const btn = document.getElementById("btn");

let dragging = false;
let offsetX = 0;
let offsetY = 0;

btn.addEventListener("pointerdown", (e) => {
  dragging = true;
  btn.setPointerCapture(e.pointerId);

  offsetX = e.clientX - btn.offsetLeft;
  offsetY = e.clientY - btn.offsetTop;

  btn.style.cursor = "grabbing";
});

btn.addEventListener("pointermove", (e) => {
  if (!dragging) return;

  btn.style.left = (e.clientX - offsetX) + "px";
  btn.style.top = (e.clientY - offsetY) + "px";
});

btn.addEventListener("pointerup", () => {
  dragging = false;
  btn.style.cursor = "grab";
});
</script>

</body>
</html>
